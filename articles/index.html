---
layout: default
title: All Articles
---
<div class="content" style="padding-top: 40px; padding-bottom: 80px;">
    <h2 style="font-family:'Cormorant Garamond',serif; font-weight:300; font-size:36px; color:var(--black); margin-bottom:32px; letter-spacing:-0.01em;">All Articles</h2>
    <div style="display:flex; flex-direction:column; gap:0;">
        {% for post in site.posts %}
        <div style="display:flex; gap:24px; align-items:flex-start; padding:20px 0; border-bottom:1px solid var(--rule);">
            <a href="{{ post.url | relative_url }}" style="flex-shrink:0; width:120px; height:80px; overflow:hidden; background:#e8e8e8; display:block;">
                <img src="{{ post.image }}" alt="{{ post.title }}" style="width:100%; height:100%; object-fit:cover;">
            </a>
            <div style="flex:1; min-width:0;">
                <span class="tag">{{ post.category }}</span>
                <h3 style="font-family:'Cormorant Garamond',serif; font-weight:400; font-size:20px; color:var(--black); line-height:1.2; margin-bottom:6px;">
                    <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
                </h3>
                <p style="font-family:'DM Sans',sans-serif; font-size:12px; color:var(--light);">
                    {% if post.author %}{{ post.author }} &nbsp;·&nbsp; {% endif %}{{ post.date | date: "%B %-d, %Y" }}
                </p>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
