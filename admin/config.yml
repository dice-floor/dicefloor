backend:
  name: github
  repo: dice-floor/dicefloor
  branch: main
  auth_type: pkce
  app_id: REPLACE_WITH_YOUR_GITHUB_OAUTH_APP_CLIENT_ID

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "posts"
    label: "Articles"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "article"}
      - {label: "Title", name: "title", widget: "string"}
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Cruise Lines", "Land Casinos", "Jobs", "Articles", "Learning"]
      - {label: "Author", name: "author", widget: "string", default: "Staff Writer", required: false}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Featured Image URL", name: "image", widget: "string", required: false, hint: "Paste an image URL, or upload below"}
      - {label: "Audio File (MP3)", name: "audio", widget: "file", required: false, hint: "Upload the NotebookLM MP3 here"}
      - {label: "Excerpt", name: "excerpt", widget: "text", hint: "Short summary shown on the homepage"}
      - {label: "Body", name: "body", widget: "markdown"}
